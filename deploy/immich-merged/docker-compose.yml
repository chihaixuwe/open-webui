services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - immich_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  immich-server:
    image: ghcr.io/immich-app/immich-server:v1.100.0
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - UPLOAD_LOCATION=/data/uploads
      - JWT_SECRET=${WEBUI_SECRET_KEY}
      - DISABLE_SIGNUP=true
      - DISABLE_PASSWORD_LOGIN=true
    volumes:
      - immich_uploads:/data/uploads
    depends_on:
      - postgres
      - redis

  webui:
    build:
      context: /www/wwwroot/deepay.srl/deepay-ai-platform
      dockerfile: /www/wwwroot/deepay.srl/deepay-ai-platform/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - UPLOAD_PATH=/data/uploads
    volumes:
      - immich_uploads:/data/uploads
    ports:
      - "8080:80"
    depends_on:
      - postgres

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webui
      - immich-server

volumes:
  immich_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/immich/uploads

  immich_pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/immich/pgdata
